name: Sync Upstream

on:
  schedule:
    # 每天北京时间 10:00 自动运行（UTC时间2:00）
    - cron: '0 2 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/huangxd-/danmu_api.git
          git fetch upstream

      - name: Merge upstream changes
        run: |
          git checkout main
          git merge upstream/main --no-edit --allow-unrelated-histories

      - name: Push changes
        run: git push origin main
